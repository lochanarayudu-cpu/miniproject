<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Image Color Picker</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#667eea,
#764ba2,
#ff758c
);
background-size:300% 300%;
animation:bgMove 10s infinite alternate;
padding:20px;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

.container{
width:1000px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
color:white;
}

h1{
text-align:center;
margin-bottom:20px;
}

.upload{
display:flex;
justify-content:center;
margin-bottom:20px;
}

input[type=file]{
padding:10px;
background:white;
border-radius:10px;
color:black;
}

.canvas-box{
position:relative;
overflow:hidden;
border-radius:15px;
}

canvas{
width:100%;
border-radius:15px;
cursor:crosshair;
background:white;
}

#magnifier{
position:absolute;
width:120px;
height:120px;
border:4px solid white;
border-radius:50%;
pointer-events:none;
display:none;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

.dashboard{
margin-top:20px;
display:grid;
grid-template-columns:1fr 250px;
gap:20px;
}

.details{
background:rgba(255,255,255,.15);
padding:20px;
border-radius:15px;
}

.details p{
margin:12px 0;
font-size:18px;
}

.preview{
background:rgba(255,255,255,.15);
padding:20px;
border-radius:15px;
text-align:center;
}

.color-box{
width:150px;
height:150px;
margin:auto;
border-radius:15px;
border:3px solid white;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

@media(max-width:768px){
.dashboard{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="container">

<h1>🎨 Modern Image Color Picker</h1>

<div class="upload">
<input type="file" id="upload" accept="image/*">
</div>

<div class="canvas-box">
<canvas id="canvas"></canvas>
<div id="magnifier"></div>
</div>

<div class="dashboard">

<div class="details">
<p>📍 X: <span id="x">0</span></p>
<p>📍 Y: <span id="y">0</span></p>
<p>🎨 RGB: <span id="rgb">-</span></p>
<p>🔳 HEX: <span id="hex">-</span></p>
<p>🌈 HSL: <span id="hsl">-</span></p>
</div>

<div class="preview">
<div class="color-box" id="colorBox"></div>
<button onclick="copyHex()">Copy HEX</button>
</div>

</div>
</div>

<script>

const upload=document.getElementById("upload");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const xText=document.getElementById("x");
const yText=document.getElementById("y");
const rgbText=document.getElementById("rgb");
const hexText=document.getElementById("hex");
const hslText=document.getElementById("hsl");
const colorBox=document.getElementById("colorBox");
const magnifier=document.getElementById("magnifier");

let currentHex="#000000";

upload.addEventListener("change",(e)=>{

const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(event){

const img=new Image();

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

};

img.src=event.target.result;
};

reader.readAsDataURL(file);

});

canvas.addEventListener("mousemove",(e)=>{

const rect=canvas.getBoundingClientRect();

const scaleX=canvas.width/rect.width;
const scaleY=canvas.height/rect.height;

const x=Math.floor((e.clientX-rect.left)*scaleX);
const y=Math.floor((e.clientY-rect.top)*scaleY);

xText.textContent=x;
yText.textContent=y;

const pixel=ctx.getImageData(x,y,1,1).data;

const r=pixel[0];
const g=pixel[1];
const b=pixel[2];

const rgb=`rgb(${r}, ${g}, ${b})`;

rgbText.textContent=rgb;

const hex="#" +
((1<<24)+(r<<16)+(g<<8)+b)
.toString(16)
.slice(1)
.toUpperCase();

hexText.textContent=hex;

currentHex=hex;

colorBox.style.background=rgb;

hslText.textContent=rgbToHsl(r,g,b);

magnifier.style.display="block";
magnifier.style.left=(e.offsetX-60)+"px";
magnifier.style.top=(e.offsetY-60)+"px";

});

canvas.addEventListener("mouseleave",()=>{
magnifier.style.display="none";
});

function copyHex(){

navigator.clipboard.writeText(currentHex);

alert("HEX Copied: "+currentHex);

}

function rgbToHsl(r,g,b){

r/=255;
g/=255;
b/=255;

let max=Math.max(r,g,b);
let min=Math.min(r,g,b);

let h,s,l=(max+min)/2;

if(max===min){
h=s=0;
}else{

let d=max-min;

s=l>0.5
? d/(2-max-min)
: d/(max+min);

switch(max){

case r:
h=(g-b)/d+(g<b?6:0);
break;

case g:
h=(b-r)/d+2;
break;

case b:
h=(r-g)/d+4;
break;

}

h/=6;
}

return `hsl(${Math.round(h*360)},
${Math.round(s*100)}%,
${Math.round(l*100)}%)`;

}

</script>

</body>
</html>
